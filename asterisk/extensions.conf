[globals]
CONF_TIMEOUT=30
HA_URL=https://HOME_ASSISTANT_URL
HA_TOKEN=LONG_LIVED_TOKEN
DAHUA_USERNAME=VTO_USERNAME
DAHUA_PASSWORD=VTO_PASSWORD

[general]
static=yes

;;;;;;;;;;;;;;;;;;;;;;;;;
; Reusable Subroutines
;;;;;;;;;;;;;;;;;;;;;;;;;

[doorbell-webhook]
; ARG1: event  ARG2: confbridge  ARG3: admin extension
exten => s,1,NoOp(Webhook: event=${ARG1} confbridge=${ARG2} admin=${ARG3})
 same => n,Set(RESULT=${SHELL(curl -s -X POST ${HA_URL}/api/services/asterisk_doorbell/${ARG1} -H 'Authorization: Bearer ${HA_TOKEN}' -H 'Content-Type: application/json' -d '{"confbridge":"${ARG2}","extension":"${ARG3}"}')})
 same => n,Return()

; Notifies both doorbells to terminate the call 
[doorbell-hangup]
exten => s,1,NoOp(Forcing Dahua doorbells to hang up)
 same => n,Set(RESULT=${SHELL(curl -s --digest --user ${DAHUA_USERNAME}:${DAHUA_PASSWORD} --globoff "http://192.168.5.7/cgi-bin/phoneControl.cgi?action=cancel")})
 same => n,Set(RESULT=${SHELL(curl -s --digest --user ${DAHUA_USERNAME}:${DAHUA_PASSWORD} --globoff "http://192.168.5.8/cgi-bin/phoneControl.cgi?action=cancel")})
 same => n,Return()

; If the doorbell call leaves the call before it's answered, this sends the terminate notification to HA
[doorbell-hangup-handler]
exten => s,1,NoOp(Hangup handler fired for ${CHANNEL(name)})
 same => n,GotoIf($["${HH_CONFBRIDGE}" = ""]?done)
 same => n,Verbose(3,HANGUP HANDLER: Sending terminate for ${HH_CONFBRIDGE})
 same => n,Originate(LOCAL/${HH_WEBHOOK}@webhook-relay,exten,originated,s,1,10,av(WH_EVENT=terminate^WH_CONFBRIDGE=${HH_CONFBRIDGE}^WH_ADMIN=${HH_ADMIN}))
 same => n,Gosub(doorbell-hangup,s,1)
 same => n(done),Return()

; Video Doorbell subroutine
[doorbell-user]
exten => s,1,Progress()
 same => n,Set(CONFBRIDGE=${ARG1})
 same => n,Set(ADMIN=${ARG2})
 same => n,Set(TIMEOUT=${ARG3})
 same => n,Set(WEBHOOK=${ARG4})
 ; Set variables for hangup handler (single underscore — only this channel)
 same => n,Set(_HH_CONFBRIDGE=${CONFBRIDGE})
 same => n,Set(_HH_ADMIN=${ADMIN})
 same => n,Set(_HH_WEBHOOK=${WEBHOOK})
 ; Register hangup handler
 same => n,Set(CHANNEL(hangup_handler_push)=doorbell-hangup-handler,s,1)
 ; Notify Home Assistant of incoming call
 same => n,Originate(LOCAL/${WEBHOOK}@webhook-relay,exten,originated,s,1,10,av(WH_EVENT=call^WH_CONFBRIDGE=${CONFBRIDGE}^WH_ADMIN=${ADMIN}))
 ; Start timeout watchdog
 same => n,Originate(LOCAL/${TIMEOUT}@timeout-relay,exten,originated,s,1,$[${CONF_TIMEOUT} * 2],av(TO_CONFBRIDGE=${CONFBRIDGE}^TO_SECONDS=${CONF_TIMEOUT}))
 ; Join conference as visitor (blocks until conference ends)
 same => n,Verbose(3,USER JOINING: Joining conference ${CONFBRIDGE} as default_user)
 same => n,ConfBridge(${CONFBRIDGE},${CONFBRIDGE},default_user)
 same => n,Verbose(3,USER LEAVING: User has left conference ${CONFBRIDGE})
 same => n,Return()

; Responding
[doorbell-admin]
; ARG1: confbridge  ARG2: admin ext  ARG3: timeout ext  ARG4: webhook ext
exten => s,1,Progress()
 same => n,Set(CONFBRIDGE=${ARG1})
 same => n,Set(ADMIN=${ARG2})
 same => n,Set(WEBHOOK=${ARG4})
 ; Notify Home Assistant that the call is being answered
 same => n,Originate(LOCAL/${WEBHOOK}@webhook-relay,exten,originated,s,1,5,av(WH_EVENT=answered^WH_CONFBRIDGE=${CONFBRIDGE}^WH_ADMIN=${ADMIN}))
 same => n,Verbose(3,ADMIN JOINING: Joining conference ${CONFBRIDGE} as admin_user)
 same => n,ConfBridge(${CONFBRIDGE},${CONFBRIDGE},admin_user)
 same => n,Return()

[doorbell-timeout]
; ARG1: confbridge  ARG2: timeout seconds
exten => s,1,Verbose(3,TIMEOUT START: Conference=${ARG1} waiting ${ARG2} seconds)
 same => n,Wait(${ARG2})
 same => n,Verbose(3,TIMEOUT CHECK: Checking conference ${ARG1})
 ; Check if conference still exists
 same => n,Set(CONF_EXISTS=${CONFBRIDGE_INFO(locked,${ARG1})})
 same => n,GotoIf($["${CONF_EXISTS}" = ""]?conf_gone)
 ; Conference exists — check participant count
 same => n,Set(PARTY_COUNT=${CONFBRIDGE_INFO(parties,${ARG1})})
 same => n,Verbose(3,TIMEOUT CHECK: ${PARTY_COUNT} participants in ${ARG1})
 same => n,GotoIf($[${PARTY_COUNT} < 2]?kick_all)
 ; Call was answered, nothing to do
 same => n,Verbose(3,TIMEOUT: Call answered with ${PARTY_COUNT} participants — exiting)
 same => n,Return()
 same => n(kick_all),Verbose(3,TIMEOUT: No answer — kicking all from ${ARG1})
 same => n,ConfKick(${ARG1},all)
 same => n,Return()
 same => n(conf_gone),Verbose(3,TIMEOUT: Conference ${ARG1} no longer exists)
 same => n,Return()

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Relay contexts for Originate calls
; These read channel variables set via v() and forward them as proper Gosub arguments
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[webhook-relay]
exten => _X.,1,NoOp(Webhook relay for extension ${EXTEN})
 same => n,Gosub(doorbell-webhook,s,1(${WH_EVENT},${WH_CONFBRIDGE},${WH_ADMIN}))
 same => n,Hangup()

[timeout-relay]
exten => _X.,1,NoOp(Timeout relay for extension ${EXTEN})
 same => n,Gosub(doorbell-timeout,s,1(${TO_CONFBRIDGE},${TO_SECONDS}))
 same => n,Hangup()

[originated]
; Landing context for the answering leg of Originate calls
exten => s,1,NoOp(Originated channel answered)
 same => n,Hangup()

;;;;;;;;;;;;;;;;;;;;;;;;;
; Main dial plan
;;;;;;;;;;;;;;;;;;;;;;;;;

[default]

;;;;;;;;;;;;;;;;;;;;;;;;
; Doorbell Front
;;;;;;;;;;;;;;;;;;;;;;;;
exten => 9000,1,NoOp(Doorbell Front — visitor calling)
 same => n,Gosub(doorbell-user,s,1(doorbell_front,9001,9002,9003))
 same => n,Hangup()

exten => 9001,1,NoOp(Doorbell Front — admin answering)
 same => n,Gosub(doorbell-admin,s,1(doorbell_front,9001,9002,9003))
 same => n,Hangup()

;;;;;;;;;;;;;;;;;;;;;;;;
; Doorbell Back
;;;;;;;;;;;;;;;;;;;;;;;;
exten => 9100,1,NoOp(Doorbell Back — visitor calling)
 same => n,Gosub(doorbell-user,s,1(doorbell_back,9101,9102,9103))
 same => n,Hangup()

exten => 9101,1,NoOp(Doorbell Back — admin answering)
 same => n,Gosub(doorbell-admin,s,1(doorbell_back,9101,9102,9103))
 same => n,Hangup()